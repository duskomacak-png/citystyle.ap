<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CityStyle.app</title>
  <meta name="description" content="CityStyle.app — saloni i prodavnice patika kroz QR/PWA profil.">
  <meta name="theme-color" content="#0b0b0f">
  <script>
    (function prepareCityStyleManifestEarly(){
      function safeSlugName(slug){
        return String(slug || "CityStyle profil")
          .replace(/[-_]+/g, " ")
          .replace(/\b\w/g, function(c){ return c.toUpperCase(); })
          .trim() || "CityStyle profil";
      }
      function addManifest(href){
        var link = document.createElement("link");
        link.rel = "manifest";
        link.href = href;
        document.head.appendChild(link);
      }
      try {
        var params = new URLSearchParams(window.location.search || "");
        var slug = params.get("salon");
        var profile = params.get("profile");

        // Uvek postavljamo stabilan manifest odmah.
        // Chrome/Android često neće ni pripremiti beforeinstallprompt ako profilna
        // stranica čeka Supabase/dinamički manifest. Dinamički manifest se menja
        // kasnije, ali rani manifest ima stabilne same-origin PNG ikone i ne blokira install.
        addManifest("manifest.json?v=v134fastpwafix");

        if (slug || profile) {
          // Profil još učitava pravo ime iz baze. Prompt se sme sačuvati, ali
          // korisniku se ne forsira platform install dok client.js ne postavi profil manifest.
          window.__CITYSTYLE_WAIT_PROFILE_MANIFEST__ = true;
        }
      } catch (err) {
        addManifest("manifest.json?v=v134fastpwafix");
      }
    })();
  </script>
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
  <link rel="stylesheet" href="assets/css/style.css?v=v134fastpwafix">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/config.js?v=v134fastpwafix"></script>
  <script src="assets/js/main.js?v=v134fastpwafix"></script>
  <script src="assets/js/auth.js?v=v134fastpwafix"></script>
  <script src="assets/js/booking-logic.js?v=v134fastpwafix"></script>
  <script src="assets/js/client.js?v=v134fastpwafix" defer></script>
</head>
<body>
  <noscript><div class="noscript-box">Ova aplikacija zahteva uključen JavaScript.</div></noscript>
  <main id="app" class="container">
    <section class="landing-page platform-text-page">
      <div class="loading-box">Učitavanje CityStyle.app...</div>
    </section>
  </main>
</body>
</html>
