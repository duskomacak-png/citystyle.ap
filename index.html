<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CityStyle.app - Platforma za salone</title>
  <meta name="description" content="CityStyle.app je platforma za online zakazivanje termina u frizerskim i beauty salonima preko QR koda.">
  <meta name="theme-color" content="#0b0b0f">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
  <link rel="stylesheet" href="assets/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/booking-logic.js"></script>
  <script src="assets/js/client.js" defer></script>
</head>
<body>
  <noscript><div class="noscript-box">Ova aplikacija zahteva uključen JavaScript.</div></noscript>
  <main id="app" class="container"><div class="loading-box">Učitavanje...</div></main>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js').catch(console.error));
    }
  </script>
</body>
</html>
