<!doctype html>
<html lang="sr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0F0F11" />
  <title>CityStyle.app MVP v1.3.2</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css?v=132" />
</head>
<body>
  <div class="desktop-stage">
    <main class="app-shell" id="appShell">
      <header class="topbar">
        <div>
          <p class="eyebrow">QR digitalni izlog</p>
          <h1 id="businessName">Urban Step</h1>
        </div>
        <button class="icon-btn" id="shareBusinessBtn" type="button" aria-label="Podeli profil">↗</button>
      </header>

      <section class="hero-card" id="heroCard">
        <div class="hero-glow"></div>
        <p class="badge" id="businessTypeBadge">Prodavnica patika</p>
        <h2 id="heroTitle">Premium mobilni izlog bez kupčevog login-a.</h2>
        <p id="heroText">Pregledaj ponudu, otvori detalj, pošalji upit ili pozovi.</p>
      </section>

      <nav class="segment-tabs" aria-label="Tip prikaza">
        <button class="tab active" id="tabProducts" type="button">Proizvodi</button>
        <button class="tab" id="tabServices" type="button">Usluge</button>
      </nav>

      <section class="feed" id="feed" aria-live="polite"></section>

      <footer class="footer-brand">powered by citystyle.app</footer>
    </main>
  </div>

  <section class="detail-overlay hidden" id="detailOverlay" aria-hidden="true">
    <div class="detail-panel" role="dialog" aria-modal="true" aria-label="Detalj ponude">
      <div class="detail-scroll" id="detailScroll">
        <div class="detail-topbar">
          <button class="round-btn" id="closeDetailBtn" type="button" aria-label="Zatvori">×</button>
          <button class="round-btn" id="shareItemBtn" type="button" aria-label="Podeli">↗</button>
        </div>

        <div class="detail-gallery" id="detailGallery">
          <button class="gallery-arrow left" id="prevImgBtn" type="button" aria-label="Prethodna slika">‹</button>
          <div class="gallery-frame" id="galleryFrame">
            <img id="detailImage" alt="Slika ponude" />
          </div>
          <button class="gallery-arrow right" id="nextImgBtn" type="button" aria-label="Sledeća slika">›</button>
          <button class="zoom-btn" id="zoomBtn" type="button">Zum</button>
          <div class="dots" id="dots"></div>
        </div>

        <article class="detail-content">
          <p class="detail-kicker" id="detailKicker">Proizvod</p>
          <h2 id="detailTitle">Naziv</h2>
          <p class="detail-price" id="detailPrice">Cena</p>
          <div class="info-grid" id="detailInfo"></div>
          <p class="detail-description" id="detailDescription"></p>
        </article>

        <footer class="detail-powered">powered by citystyle.app</footer>
      </div>

      <div class="sticky-cta">
        <button class="cta primary" id="primaryCtaBtn" type="button">Pošalji upit</button>
        <button class="cta secondary" id="callBtn" type="button">Pozovi</button>
      </div>
    </div>
  </section>

  <script src="script.js?v=132"></script>
</body>
</html>
