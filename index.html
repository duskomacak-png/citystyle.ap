<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CityStyle.app</title>
  <meta name="description" content="CityStyle.app — saloni i prodavnice patika kroz QR/PWA profil.">
  <meta name="theme-color" content="#0b0b0f">
  <script>
    (function prepareCityStyleManifestEarly(){
      function safeSlugName(slug){
        return String(slug || "CityStyle profil")
          .replace(/[-_]+/g, " ")
          .replace(/\b\w/g, function(c){ return c.toUpperCase(); })
          .trim() || "CityStyle profil";
      }
      function addManifest(href){
        var link = document.createElement("link");
        link.rel = "manifest";
        link.href = href;
        document.head.appendChild(link);
      }
      try {
        var params = new URLSearchParams(window.location.search || "");
        var slug = params.get("salon") || params.get("profile");
        if (!slug) {
          addManifest("manifest.json?v=v1345maskable");
          return;
        }
        var encodedSlug = encodeURIComponent(slug);
        var isProfileCode = String(slug).indexOf("cs_p_") === 0;
        var profileName = isProfileCode ? "CityStyle profil" : safeSlugName(slug);
        var manifest = {
          id: (isProfileCode ? "/?profile=" : "/?salon=") + encodedSlug,
          name: profileName,
          short_name: profileName.length > 12 ? profileName.slice(0, 12).trim() : profileName,
          description: "Prečica za direktan ulaz u ovaj CityStyle profil.",
          start_url: (isProfileCode ? "/?profile=" : "/?salon=") + encodedSlug + "&pwa_profile=" + encodedSlug + "&v=v1345maskable",
          scope: "/",
          display: "standalone",
          background_color: "#0b0b0f",
          theme_color: "#b91c1c",
          orientation: "portrait",
          icons: [
            { src: "/assets/icons/icon-192.png", sizes: "192x192", type: "image/png", purpose: "any" },
            { src: "/assets/icons/icon-512.png", sizes: "512x512", type: "image/png", purpose: "any" },
            { src: "/assets/icons/icon-192-maskable.png", sizes: "192x192", type: "image/png", purpose: "maskable" },
            { src: "/assets/icons/icon-512-maskable.png", sizes: "512x512", type: "image/png", purpose: "maskable" }
          ]
        };
        var blob = new Blob([JSON.stringify(manifest)], { type: "application/manifest+json" });
        addManifest(URL.createObjectURL(blob));
      } catch (err) {
        addManifest("manifest.json?v=v1345maskable");
      }
    })();
  </script>
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
  <link rel="stylesheet" href="assets/css/style.css?v=v1345maskable">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/config.js?v=v1345maskable"></script>
  <script src="assets/js/main.js?v=v1345maskable"></script>
  <script src="assets/js/auth.js?v=v1345maskable"></script>
  <script src="assets/js/booking-logic.js?v=v1345maskable"></script>
  <script src="assets/js/client.js?v=v1345maskable" defer></script>
</head>
<body>
  <noscript><div class="noscript-box">Ova aplikacija zahteva uključen JavaScript.</div></noscript>
  <main id="app" class="container">
    <section class="landing-page platform-text-page">
      <div class="loading-box">Učitavanje CityStyle.app...</div>
    </section>
  </main>
</body>
</html>
